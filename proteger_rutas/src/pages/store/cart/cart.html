<!DOCTYPE html>
<html lang="es">
<head>

    <title>Food Store - Mi Carrito</title>
    <link rel="stylesheet" href="../../../style.css">
</head>
<body>
    <header>
        <h1>Tu Pedido</h1>
        <nav>
            <ul>
                <li><a href="../home/home.html">← Volver a la Tienda</a></li>
            </ul>

    <main>
        <section class="buscador-form" style="flex-direction: column; align-items: stretch;">
            <ul id="cart-list" style="list-style: none; padding: 0;">

                <span>Total:</span>
                <span>$<span id="total-price">0</span></span>

            <button class="btn-buscar" style="margin-top: 20px; width: 100%;">Confirmar Compra</button>
        </section>
    </main>

    <script type="module" src="./cart.ts"></script>
